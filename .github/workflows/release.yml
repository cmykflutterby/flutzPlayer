name: Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-windows:
    name: Build Windows Release
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MSYS2 Toolchain
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-toolchain

      - name: Install Rust (GNU toolchain)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-gnu

      - name: Prepare Vendor Sources
        shell: pwsh
        run: ./gh/Prepare-GhVendor.ps1

      - name: Build Release Drop
        shell: pwsh
        env:
          FLUTZ_SOUNDFONT_URL: ${{ secrets.FLUTZ_SOUNDFONT_URL }}
        run: ./gh/Invoke-GhReleaseBuild.ps1 -Configuration Release

      - name: Package Release Zip
        shell: pwsh
        run: ./gh/Package-GhRelease.ps1 -OutputDirectory artifacts -ArchiveName flutzplayer-windows-x64.zip

      - name: Upload Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutzplayer-windows-x64
          path: artifacts/flutzplayer-windows-x64.zip
          if-no-files-found: error

      - name: Publish GitHub Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/flutzplayer-windows-x64.zip
