# Default soundfont ID to use when loading a FMID that doesn't specify overrides
default_soundfont_id = "hiqual"

# Packing order determines how assets are arranged in the DAT archive.
# Available options:
#   - "smallest-first": Assets are sorted by source file size (smallest to largest).
#                       This is the recommended approach for optimal packing efficiency.
#   - "manifest-order": Assets are packed in the order they appear in this manifest.
#
# If this setting is missing or contains an unrecognized value, "smallest-first" is used.
packing_order = "smallest-first"

